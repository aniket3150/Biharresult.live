name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate section pages
        env:
          ASSET_VERSION: ${{ github.sha }}
        run: node tools/generate-seo-post-pages.js

      - name: Build Pages artifact with versioned assets
        env:
          ASSET_VERSION: ${{ github.sha }}
        run: node tools/build-pages-artifact.js

      - name: Validate generated site
        run: node tools/validate-site.js

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          force_orphan: true
          enable_jekyll: false